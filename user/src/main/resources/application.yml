spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ex
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update

