spring:
  application:
    name: gateway

  datasource:
    url: jdbc:postgresql://postgres-db:5432/babko
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/ai/**

        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/api/v1/companys/**

        - id: hub-service
          uri: lb://hub-service
          predicates:
            - Path=/api/v1/hubs/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        - id: slack-service
          uri: lb://slack-service
          predicates:
            - Path=/api/v1/slack/**

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/deliverys/**

        - id: common-service
          uri: lb://common-service
          predicates:
            - Path=/api/v1/common/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

      discovery:
        locator:
          enabled: true


eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
